server:
  port: 8080
spring:
  application:
    name: enterprise-iam-platform
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/enterprise-iam-platform}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
logging:
  level:
    com.banking: INFO
